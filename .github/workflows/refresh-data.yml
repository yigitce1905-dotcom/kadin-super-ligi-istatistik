name: Aylik Veri Tazeleme

# Ayda bir SoccerDonna kariyer verisini (scouting + ana lig) yeniden ceker
# ve degisiklik varsa otomatik commit eder. Manuel de tetiklenebilir.

on:
  schedule:
    - cron: '0 3 1 * *'   # her ayin 1'i, 03:00 UTC
  workflow_dispatch: {}   # Actions sekmesinden elle calistirma

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bagimliliklar
        run: pip install requests beautifulsoup4 pandas openpyxl

      - name: Scouting kariyer verisi
        run: python scrape_leistungsdaten.py

      - name: Ana lig kariyer verisi
        run: python scrape_leistungsdaten.py --analig

      - name: Degisiklikleri commit et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scouting_leistungsdaten.json analig_leistungsdaten.json
          if git diff --staged --quiet; then
            echo "Degisiklik yok."
          else
            git commit -m "chore: aylik veri tazeleme [skip ci]"
            git push
          fi
