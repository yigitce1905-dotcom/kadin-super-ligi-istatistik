[theme]
base = "dark"
primaryColor = "#a855f7"
backgroundColor = "#0f1117"
secondaryBackgroundColor = "#1a1f36"
textColor = "#e0e0e0"
font = "sans serif"

[client]
showErrorDetails = "none"
toolbarMode = "minimal"

[server]
enableStaticServing = true
# Prod (Render): dosya-izleyici thread'i kapalı → CPU tasarrufu (hot-reload gerekmez)
fileWatcherType = "none"

[runner]
# Hızlı tıklamada önceki rerun iptal edilip yenisi başlar → daha akıcı tepki
fastReruns = true
